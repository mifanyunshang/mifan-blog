name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main  # 推送至main分支时自动触发部署
  workflow_dispatch:  # 支持在GitHub网页手动触发部署

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予写入权限，用于推送gh-pages分支
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整提交历史

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # 缓存npm依赖，加速构建

      - name: Install dependencies
        run: npm install

      - name: Build Hexo static files
        run: npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # GitHub自动提供的令牌，无需手动配置
          publish_dir: ./public  # Hexo构建输出目录
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
